name: CI - API

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/ci-api.yml"
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/ci-api.yml"

defaults:
  run:
    working-directory: ./api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        # postinstall runs `prisma generate`
        run: npm ci

      - name: Build (typecheck + compile)
        run: npm run build

      - name: Unit tests
        # services + auth controller unit tests (no DB needed).
        # project.test.ts is excluded: it has a pre-existing failure on main
        # (createProject controller/service arg mismatch) tracked separately.
        run: npx jest --testPathPattern="services|auth\.test" --ci --passWithNoTests
