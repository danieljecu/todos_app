name: Deploy Migrations

on:
  push:
    branches:
      - main
    paths:
      - "Migrations/**"
      - ".github/workflows/deploy-migrations.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Flyway migrations against Neon
        # flyway/flyway:10 bundles its own JRE and supports current PostgreSQL.
        # NEON_DB_URL must be a JDBC url including SSL, e.g.
        #   jdbc:postgresql://<host>.neon.tech/<db>?sslmode=require
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/Migrations:/flyway/sql" \
            flyway/flyway:10 \
            -url="${{ secrets.NEON_DB_URL }}" \
            -user="${{ secrets.NEON_DB_USER }}" \
            -password="${{ secrets.NEON_DB_PASSWORD }}" \
            -locations="filesystem:/flyway/sql/schema" \
            -outOfOrder=true \
            -connectRetries=5 \
            migrate
